{% extends 'base.html' %}
{% block title %}Delete Recipe{% endblock %}
{% block content %}
<div class="px-4 py-6 sm:px-6 lg:px-8 max-w-lg mx-auto">
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8 text-center">
    <div class="w-14 h-14 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
      <svg class="w-7 h-7 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
      </svg>
    </div>
    <h1 class="text-xl font-bold text-gray-900 mb-2">Delete Recipe</h1>
    <p class="text-gray-600 mb-6">Are you sure you want to delete <strong>"{{ recipe.title }}"</strong>? This cannot be undone.</p>
    <div class="flex gap-3 justify-center">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="px-6 py-2.5 bg-red-600 text-white text-sm font-semibold rounded-lg hover:bg-red-700">Delete</button>
      </form>
      <a href="{% url 'recipe_detail' recipe.pk %}" class="px-6 py-2.5 bg-white border border-gray-300 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-50">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
